<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Exercise-Tracker{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card { background:#fff; border:1px solid #f1f5f9; border-radius:1rem; box-shadow:0 1px 2px rgba(15,23,42,0.04); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-md">
    <div class="flex items-center justify-center gap-2 mb-8">
      <i class="fas fa-dumbbell text-indigo-600 text-xl"></i>
      <span class="font-bold text-lg text-slate-900">Exercise-Tracker</span>
    </div>

    <div class="card p-6 md:p-8">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
            <div class="mb-5 rounded-lg px-4 py-3 text-sm {% if category == 'error' %}bg-red-50 border border-red-200 text-red-700{% else %}bg-indigo-50 border border-indigo-200 text-indigo-700{% endif %}">
              {{ msg }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </div>

    {% block footer %}{% endblock %}
  </div>

</body>
</html>
