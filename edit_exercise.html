<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercise-Tracker – Edit Exercise</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-50">

  <div id="overlay" class="fixed inset-0 bg-black/40 z-20 hidden" onclick="toggleSidebar()"></div>

  <aside id="sidebar" class="fixed top-0 left-0 h-full w-60 bg-white border-r border-gray-200 z-30 flex flex-col -translate-x-full md:translate-x-0 transition-transform duration-200">
    <div class="flex items-center gap-2 h-14 px-5 border-b border-gray-200">
      <i class="fas fa-dumbbell text-indigo-600"></i>
      <span class="font-bold text-gray-900">Exercise-Tracker</span>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100"><i class="fas fa-house w-4"></i> Dashboard</a>
      <a href="log_exercise.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100"><i class="fas fa-plus w-4"></i> Log Exercise</a>
      <a href="history.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium bg-indigo-50 text-indigo-700"><i class="fas fa-list w-4"></i> History</a>
      <a href="goals.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100"><i class="fas fa-bullseye w-4"></i> Goals</a>
      <a href="social.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100"><i class="fas fa-users w-4"></i> Social Feed</a>
      <a href="profile.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100"><i class="fas fa-user w-4"></i> Profile</a>
      <a href="settings.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100"><i class="fas fa-gear w-4"></i> Settings</a>
    </nav>
    <div class="p-3 border-t border-gray-200">
      <div class="flex items-center gap-3 px-3 py-2">
        <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold text-sm">J</div>
        <span class="text-sm font-medium text-gray-900">John Doe</span>
      </div>
    </div>
  </aside>

  <div class="md:hidden fixed top-0 inset-x-0 h-14 bg-white border-b border-gray-200 flex items-center gap-3 px-4 z-10">
    <button onclick="toggleSidebar()"><i class="fas fa-bars text-gray-600"></i></button>
    <span class="font-bold text-gray-900">Exercise-Tracker</span>
  </div>

  <main class="md:ml-60 pt-14 md:pt-0 p-6 max-w-xl">

    <!-- Breadcrumb -->
    <p class="text-sm text-gray-400 mb-5">
      <a href="history.html" class="hover:text-indigo-600">History</a> / Edit Workout
    </p>

    <div class="mb-6">
      <h1 class="text-2xl font-bold text-gray-900">Edit Exercise</h1>
      <p class="text-gray-500 text-sm mt-1">Update your workout details</p>
    </div>

    <!-- Pre-filled form (values come from Flask route in real app) -->
    <form id="editForm" class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="type">Exercise Type *</label>
        <select id="type" name="type" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option>Running</option>
          <option>Cycling</option>
          <option>Swimming</option>
          <option selected>Weight Training</option>
          <option>Yoga</option>
          <option>Walking</option>
          <option>Other</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="date">Date *</label>
        <input type="date" id="date" name="date" value="2026-04-24"
          class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="duration">Duration (minutes) *</label>
        <input type="number" id="duration" name="duration" value="60" min="1" max="600"
          class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="intensity">Intensity *</label>
        <select id="intensity" name="intensity" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option>Low</option>
          <option>Medium</option>
          <option selected>High</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="distance">Distance in km <span class="text-gray-400 font-normal">(optional)</span></label>
        <input type="number" id="distance" name="distance" step="0.1" placeholder="e.g. 5.2"
          class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="notes">Notes <span class="text-gray-400 font-normal">(optional)</span></label>
        <textarea id="notes" name="notes" rows="3"
          class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500">Felt strong today!</textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <a href="history.html" class="flex-1 text-center border border-gray-200 text-gray-600 font-medium py-2.5 rounded-lg text-sm hover:bg-gray-50">Discard</a>
        <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg text-sm">Save Changes</button>
      </div>

    </form>
  </main>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('overlay').classList.toggle('hidden');
    }

    document.getElementById('editForm').addEventListener('submit', function(e) {
      e.preventDefault();
      window.location.href = 'history.html';
    });
  </script>
</body>
</html>
